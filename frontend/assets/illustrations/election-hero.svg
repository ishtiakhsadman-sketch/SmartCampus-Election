<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#146b3a;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:0.08" />
    </linearGradient>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  
  <!-- Animated voting boxes -->
  <g opacity="0.6">
    <rect x="100" y="80" width="80" height="80" rx="10" fill="#146b3a" transform="rotate(-15 140 120)"/>
    <rect x="950" y="350" width="100" height="100" rx="12" fill="#c62828" transform="rotate(20 1000 400)"/>
    <circle cx="1050" cy="150" r="50" fill="#d4af37" opacity="0.5"/>
  </g>
  
  <!-- Ballot illustration -->
  <g>
    <rect x="300" y="150" width="120" height="180" rx="8" fill="#ffffff" stroke="#146b3a" stroke-width="2"/>
    <line x1="310" y1="170" x2="410" y2="170" stroke="#146b3a" stroke-width="1.5"/>
    <line x1="310" y1="190" x2="410" y2="190" stroke="#146b3a" stroke-width="1.5"/>
    <line x1="310" y1="210" x2="410" y2="210" stroke="#146b3a" stroke-width="1.5"/>
    <circle cx="315" cy="175" r="5" fill="none" stroke="#c62828" stroke-width="2"/>
    <circle cx="315" cy="195" r="5" fill="none" stroke="#c62828" stroke-width="2"/>
    <circle cx="315" cy="215" r="5" fill="#c62828"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="450" r="40" fill="#d4af37" opacity="0.3"/>
  <circle cx="1000" cy="480" r="60" fill="#146b3a" opacity="0.2"/>
  
  <!-- Checkmark -->
  <g transform="translate(700, 200)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#146b3a" stroke-width="3" opacity="0.5"/>
    <path d="M -20 5 L 0 25 L 25 -15" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>